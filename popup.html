<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财摘</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="editor-view" class="view">
        <header class="toolbar">
          <div class="brand-lockup">
            <img class="brand-logo" src="assets/logo.svg" alt="" aria-hidden="true">
            <div class="brand-copy">
              <strong class="brand-name">财摘</strong>
              <span class="template-name">Default</span>
            </div>
          </div>
          <button id="open-settings" class="icon-button" type="button" aria-label="打开模板设置" title="模板设置">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.12 2.12-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.04 1.55V20.3h-3v-.09a1.7 1.7 0 0 0-1.04-1.55 1.7 1.7 0 0 0-1.88.34l-.06.06-2.12-2.12.06-.06A1.7 1.7 0 0 0 7 15a1.7 1.7 0 0 0-1.55-1.04H5.3v-3h.15A1.7 1.7 0 0 0 7 9.92a1.7 1.7 0 0 0-.34-1.88L6.6 7.98l2.12-2.12.06.06a1.7 1.7 0 0 0 1.88.34A1.7 1.7 0 0 0 11.7 4.7v-.1h3v.1a1.7 1.7 0 0 0 1.04 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.12 2.12-.06.06a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.55 1.04h.15v3h-.15A1.7 1.7 0 0 0 19.4 15Z"/></svg>
          </button>
        </header>

        <div class="editor-scroll">
          <textarea id="document-title" class="title-input" rows="2" aria-label="文章标题" placeholder="未命名笔记"></textarea>

          <section class="properties-section" aria-labelledby="properties-heading">
            <h2 id="properties-heading" class="section-title">属性</h2>
            <div id="properties-list" class="properties-list"></div>
            <button id="add-property" class="add-property" type="button">＋ 添加属性</button>
          </section>
        </div>
      </section>

      <section id="settings-view" class="view" hidden>
        <header class="toolbar settings-toolbar">
          <button id="cancel-settings" class="icon-button" type="button" aria-label="返回编辑页" title="取消并返回">←</button>
          <strong>Default 模板设置</strong>
          <button id="save-settings" class="toolbar-action" type="button">保存</button>
        </header>

        <div class="settings-scroll">
          <div id="settings-status" class="settings-status" role="status" aria-live="polite"></div>
          <section class="settings-group">
            <div class="settings-heading">
              <h2>默认属性</h2>
              <span>拖动顺序将在保存时保留</span>
            </div>
            <div id="template-properties-list" class="template-properties-list"></div>
            <button id="add-template-property" class="add-property" type="button">＋ 添加默认属性</button>
          </section>

          <section class="settings-group">
            <h2>保存位置</h2>
            <label class="setting-field">
              <span>笔记目录</span>
              <input id="note-directory" type="text" placeholder="Vault 根目录" autocomplete="off">
            </label>
            <label class="setting-field">
              <span>附件目录</span>
              <input id="attachment-directory" type="text" value="attachments/caizhai" autocomplete="off">
            </label>
            <div class="vault-row">
              <span>Vault</span>
              <strong id="vault-name">尚未选择</strong>
            </div>
            <button id="change-vault" class="secondary-button" type="button">重新选择 Vault</button>
          </section>

          <p class="privacy">内容仅在当前浏览器与你选择的 Vault 之间处理。</p>
        </div>
      </section>

      <footer id="action-dock" class="action-dock">
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <input id="quick-note-directory" type="text" aria-label="笔记目录" placeholder="Vault 根目录" autocomplete="off">
        <button id="primary-button" class="primary" type="button">添加到 Obsidian</button>
      </footer>
    </main>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
